<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosol-cat</title>
    <link rel="apple-touch-icon" href="images/logo.png">
    <meta name="apple-mobile-web-app-title" content="Prosol 24">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 10px;
            padding-bottom: 60px;
        }

        .row {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .photo {
            width: 90%;
            max-width: 380px;
            height: auto;
            margin: 0 auto;
            display: block;
            object-fit: contain;
            cursor: pointer;
            box-sizing: border-box;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            z-index: 1;
        }

        body.ready .photo, body.ready .footer {
            opacity: 1;
        }


        .logo2 {
            width: 50px;
            height: 50px;
            margin-top: 20px;
            margin-left: 50px;
            display: flex;
        }

        .logo22 {
            display: flex;
            width: 100%;
            align-items: center;
        }

        h4 {
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 1em;
            color: black;
            text-align: right;
            margin-top: 30px;
            margin-right: 50px;
            margin-left: 190px;
            margin-bottom: 20px;
            text-decoration: none !important;
            border-radius: 8px;
        }

        h3 {
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 24px;
            color: black;
            text-align: center;
            margin-right: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .foot {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .footer {
            width: 90%;
            max-width: 380px;
            height: auto;
            margin: 0 auto;
            display: block;
            border-radius: 12px;
            cursor: pointer;
        }


        #buttonImage {
            cursor: pointer;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 20px;
            z-index: 100;
        }


    </style>
</head>
<body>

    <a href="index.html" id="buttonImage">
        <img src="images/btncover.png" alt="Button Image">
    </a>

    <!-- First Row -->
    <div class="logo22">
        <img class="logo2" src="images/logo.png">
        <h4>Prosol.ca</h4>
    </div>
    <div class="foot">
            <img class="footer" src="images/2026-PROSOL-fr.jpg" alt="2026 Catalogue Prosol">
    </div>

    <!-- Sections S1-S9 -->
    <div class="row">
        <a href="viewer.html?file=pdfs/S1-2026-FR.pdf&back=franc.html">
            <img class="photo" src="images/S1-FR-01.jpg" alt="S1 Floorcare">
        </a>
    </div>
    <div class="row">
        <img class="photo" src="images/S2-fr-01.jpg" alt="S2 Fournitures d'installation">
    </div>
    <div class="row">
        <img class="photo" src="images/S3-fr-01.jpg" alt="S3 Moulures et bordures">
    </div>
    <div class="row">
        <img class="photo" src="images/S4-fr-01.jpg" alt="S4">
    </div>
    <div class="row">
        <img class="photo" src="images/S5-fr-01.jpg" alt="S5">
    </div>
    <div class="row">
        <img class="photo" src="images/S6-fr-01.jpg" alt="S6">
    </div>
    <div class="row">
        <img class="photo" src="images/S7-fr-01.jpg" alt="S7">
    </div>
    <div class="row">
        <img class="photo" src="images/S8-fr-01.jpg" alt="S8">
    </div>
    <div class="row">
        <img class="photo" src="images/S9-fr-01.jpg" alt="S9">
    </div>


</body>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        document.body.classList.add("ready");
    });

</script>

</html>
