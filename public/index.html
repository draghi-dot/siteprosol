<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prosol Catalog</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      position: relative;
      color: #000;
      background-color: #ffffff;
    }

    /* 🌄 Faint background image */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("images/cat.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: brightness(0.25) opacity(0.1);
      z-index: -2;
    }

    /* White translucent overlay */
    body::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.2);
      z-index: -1;
    }

    /* Larger centered logo */
    .logo {
      width: 500px;
      /* 🟢 MODIFIED: Increased logo size to 500px */
      height: auto;
      margin-bottom: 40px;
      z-index: 1;
    }

    /* Container for rectangles */
    .rectangle-container {
      display: flex;
      flex-direction: column;
      gap: 25px;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    /* Rectangle boxes */
    .rectangle {
      width: 420px;
      border-radius: 20px;
      overflow: hidden;
      background-color: #ffffff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      border: 2px solid #e3e3e3;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px 0 12px 0;
    }

    .rectangle:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
      border-color: #d32f2f;
    }

    /* Image styling */
    .rectangle img {
      width: 90%;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      justify-content: center;
      /* Center items in the group */
    }

    /* Adjustment for the second row spacing */
    .rectangle>.button-group:last-child {
      margin-top: -5px;
      margin-bottom: 15px;
    }


    .rect-btn {
      background-color: rgba(211, 47, 47, 0.12);
      color: #d32f2f;
      border: 2px solid #d32f2f;
      border-radius: 25px;
      padding: 8px 26px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .rect-btn:hover {
      background-color: rgba(211, 47, 47, 0.25);
      transform: scale(1.05);
    }

    /* PDF viewer box */
    .pdf-viewer {
      width: 90%;
      height: 300px;
      border: none;
      border-radius: 12px;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 768px) {
      .rectangle {
        width: 320px;
      }

      .logo {
        width: 300px;
        /* 🟢 MODIFIED: Adjusted mobile size for the larger logo */
        margin-bottom: 25px;
      }

      .rect-btn {
        font-size: 0.9rem;
        padding: 7px 20px;
      }

      .pdf-viewer {
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <img class="logo" src="images/logoo.png" alt="Prosol Logo" />

  <div class="rectangle-container">

    <div class="rectangle">
      <img src="images/2026-cover.jpg" alt="Prosol Catalog 2026" />

      <div class="button-group">
        <button class="rect-btn" onclick="window.location.href='indexen.html'">English</button>
        <button class="rect-btn" onclick="window.location.href='franc.html'">Français</button>
      </div>
    </div>

    <div class="rectangle" id="pdf-rectangle">
      <img id="pdf-image" src="images/main1.jpeg" alt="Prosol PDF" />
      <div class="button-group">
        <button class="rect-btn" onclick="window.location.href='tarket-en.html'">English</button>
        <button class="rect-btn" onclick="window.location.href='tarket-fr.html'">Français</button>
      </div>
    </div>

  </div>

  <script>
    function openPDF(pdfPath) {
      const pdfFrame = document.getElementById("pdf-frame");
      const pdfImage = document.getElementById("pdf-image");

      pdfFrame.src = pdfPath;
      pdfImage.style.display = "none";
      pdfFrame.style.display = "block";
    }
  </script>

</body>

</html>
